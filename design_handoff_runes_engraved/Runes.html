<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Runes — gemtd2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #e8dec8;
      --ink: #1a1410;
      --ink-dim: #5a4a3a;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
    body { font-family: 'VT323', monospace; image-rendering: pixelated; }

    @keyframes rune-pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 1; }
    }
    @keyframes rune-orbit { to { transform: rotate(360deg); } }
    @keyframes gem-bob {
      0%, 100% { transform: translate(-50%, -55%); }
      50%      { transform: translate(-50%, -62%); }
    }

    /* Trigger animation — 0% idle, ~10% creep arrives & flares, then settles. */
    @keyframes rune-flash {
      0%, 8%, 22%, 100% { opacity: 0; }
      10% { opacity: 0.95; }
      14% { opacity: 0.4; }
      18% { opacity: 0.15; }
    }
    @keyframes rune-ring {
      0%, 8% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      10%    { opacity: 0.95; transform: translate(-50%, -50%) scale(0.6); }
      28%    { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
      100%   { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
    }
    @keyframes rune-burst-a {
      0%, 8% { opacity: 0; transform: translate(-50%, -50%) translateY(0) rotate(0deg); }
      10%    { opacity: 1; }
      24%    { opacity: 0; transform: translate(-50%, -50%) translateY(-32px) rotate(0deg); }
      100%   { opacity: 0; transform: translate(-50%, -50%) translateY(-32px) rotate(0deg); }
    }
    @keyframes rune-burst-b {
      0%, 8% { opacity: 0; transform: translate(-50%, -50%) translateY(0) rotate(45deg); }
      10%    { opacity: 1; }
      24%    { opacity: 0; transform: translate(-50%, -50%) translateY(-26px) rotate(45deg); }
      100%   { opacity: 0; transform: translate(-50%, -50%) translateY(-26px) rotate(45deg); }
    }

    .dc-root { background: var(--bg) !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="runes.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas
          title="Runes"
          subtitle="A new tower type that DOESN'T block creep pathing — creeps walk over them and trigger an effect. Single tier. Four effects."
        >
          <DCSection id="intro" title="The setup">
            <DCArtboard id="problem" label="Why runes need their own visual language" width={980} height={460}>
              <IntroCard />
            </DCArtboard>
          </DCSection>

          <DCSection id="directions" title="Three directions">
            <DCArtboard id="dir-a" label="A — Engraved Stone Tablet" width={1100} height={520}>
              <DirectionCard
                id="A"
                name="A · Engraved Stone Tablet"
                tag="Square paver inlaid into the path. Ancient, geological."
                blurb={
                  "A flat stone slab set into the path with a deep recess carved into its " +
                  "face; the glyph glows from inside the recess. Reads as 'permanent " +
                  "inscription.' Cheapest to ship — fully static silhouette per rune, " +
                  "only the glyph and glow color change."
                }
                kind="tablet"
                pros={[
                  "Reads UNAMBIGUOUSLY as 'in the ground' — square paver vs round gem.",
                  "Lowest engineering cost: one shared 14×14 sprite + glyph layer.",
                  "Calm, ambient — doesn't compete with gem towers visually.",
                ]}
                cons={[
                  "Quietest of the three — easy to miss when 4 are scattered along the maze.",
                  "Square silhouette doesn't echo the gem family at all — feels like a separate game.",
                ]}
              />
            </DCArtboard>

            <DCArtboard id="dir-b" label="B — Painted Magic Sigil" width={1100} height={520}>
              <DirectionCard
                id="B"
                name="B · Painted Magic Sigil"
                tag="Glowing ritual circle drawn on the path. Loud, magical."
                blurb={
                  "Pure light: a chalky outer ring + tick marks + inner ring + glyph, " +
                  "all painted in the effect color. No physical surface. Reads as 'magic " +
                  "ritual,' not 'object.' Highest visibility — the player will always know " +
                  "where these are."
                }
                kind="sigil"
                pros={[
                  "Loudest read at distance — even at 1× zoom you see all four colors.",
                  "Strongest 'this is magical' connotation — fits the rune fantasy.",
                  "Round footprint reads as 'walked over' (no edges).",
                ]}
                cons={[
                  "Visually competes with tower halos — could clutter the board.",
                  "Less material/diegetic; can feel like UI rather than world.",
                  "Chalky look diverges from the rest of the game's pixel-stone palette.",
                ]}
              />
            </DCArtboard>

            <DCArtboard id="dir-c" label="C — Inlaid Crystal Disc (recommended)" width={1100} height={520}>
              <DirectionCard
                id="C"
                name="C · Inlaid Crystal Disc"
                tag="Round crystal pane sunk into the path with the glyph etched on top."
                blurb={
                  "Stone bezel ring (matches path stone) + polished crystal field (effect " +
                  "color, faceted shading) + glyph etched in. Reads as a gem laid SIDEWAYS " +
                  "into the ground — same pixel-jewel vocabulary as the towers, but flat. " +
                  "Set-cohesion is strong; effect-color is the only variable."
                }
                kind="disc"
                pros={[
                  "Echoes the gem family without being mistaken for a tower.",
                  "Stone bezel grounds it; glow + glyph carry the read.",
                  "All four runes share one sprite — minimal asset cost.",
                  "Material feel matches game world (stone + crystal, no UI chalk).",
                ]}
                cons={[
                  "More pixels than A — slightly more drawing work.",
                  "Round crystal could blur with diamond/aquamarine at very small scale; mitigated by the bezel ring.",
                ]}
                recommended
              />
            </DCArtboard>
          </DCSection>

          <DCSection id="detail" title="Recommended · in detail">
            <DCArtboard id="detail-card" label="Inlaid Crystal Discs — full set + sprites + trigger FX" width={1280} height={1280}>
              <DetailCard />
            </DCArtboard>
          </DCSection>

          <DCSection id="notes" title="Handoff">
            <DCArtboard id="notes-card" label="Implementation notes" width={1100} height={420}>
              <NotesCard />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
